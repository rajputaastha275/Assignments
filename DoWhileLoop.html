<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n, sum = 0;
        do{
            n = parseInt(prompt("Enter a number(0 to stop)"));
            sum = sum + n;
        }
        while(n != 0);
        document.write(sum);
    </script>
</body>
</html>
