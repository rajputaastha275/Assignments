<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n;
        let sum = 0;
        let i = 1;
        n = parseInt(prompt("Enter a number"));
        while(i <= n)
        {
            sum = sum + i;
            i++;
        }
        document.write(sum);
    </script>
</body>
</html>
