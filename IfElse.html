<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positive Number</title>
</head>
<body>
    <script>
        let num;
        num = parseInt(prompt("Enter a number"));
        if(num % 2 == 0)
        {
            document.write(`<h1>Even Number</h1>`);
        }
        else{
            document.write(`<h1>Odd Number</h1>`);
        }
    </script>
</body>
</html>
