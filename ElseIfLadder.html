<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num;
        num = parseInt(prompt("Enter a number"));
        if(num > 0)
        {
            document.write(`<h1>Positive Number</h1>`);
        }
        else if(num < 0)
        {
            document.write(`<h1>Negative Number</h1>`);
        }
        else{
            document.write(`<h1>Zero</h1>`)
        }
    
    </script>
</body>
</html>
